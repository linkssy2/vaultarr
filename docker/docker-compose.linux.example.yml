services:
  vaultarr:
    image: ghcr.io/linkssy2/vaultarr:latest
    container_name: vaultarr
    ports:
      - "8787:8787"
    environment:
      - TZ=America/Los_Angeles
      - LOCALAPPDATA=/config
      - ./acquisitions:/acquisitions
      - VAULTARR_ACQUISITIONS_DIR=/acquisitions
      - VAULTARR_PORT=8787
    volumes:
      - ./config:/config
      - /mnt/games:/games
      - /mnt/vaultarr/backups:/backups
    restart: unless-stopped
