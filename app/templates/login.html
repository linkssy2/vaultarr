<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Vaultarr Login</title>
  <meta name="theme-color" content="#3b82f6">
  <link rel="icon" href="/static/icons/favicon.ico?v=1.1.11" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/static/icons/vaultarr.svg?v=1.1.11">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png?v=1.1.11">
  <link rel="manifest" href="/static/site.webmanifest?v=1.1.11">
  <link rel="stylesheet" href="/static/css/vaultos.css?v=1.1.11">
  <link rel="stylesheet" href="/static/css/forms.css?v=1.1.11">
  <link rel="stylesheet" href="/static/css/login.css?v=1.1.11">
  <style id="vaultarr-theme">{{ theme_css|safe }}</style>
</head>
<body class="vaultos login-body">
  <div class="vault-ambient login-ambient" aria-hidden="true"><span></span><i></i></div>

  <main class="login-shell">
    <section class="login-orbital login-vault-cosmos" aria-hidden="true">
      <div class="login-nebula"></div>
      <div class="login-comet"></div>
      <div class="login-stars"></div>
      <div class="login-orbital-field">
        <div class="login-orbit orbit-one"><span class="login-node">◇</span></div>
        <div class="login-orbit orbit-two"><span class="login-node">▣</span></div>
        <div class="login-orbit orbit-three"><span class="login-node">▤</span></div>
        <div class="login-orbit orbit-four"><span class="login-node">⌁</span></div>
        <div class="login-orbit orbit-five"><span class="login-node">✦</span></div>
        <div class="login-core"><span>V</span></div>
      </div>
    </section>

    <section class="login-card alive-panel">
      <div class="login-brand">
        <img class="brand-mark login-app-icon" src="/static/icons/vaultarr.svg?v=1.1.11" alt="Vaultarr" width="38" height="38">
        <div>
          <p class="eyebrow">Vaultarr Security</p>
          <h1>Enter the Vault.</h1>
          <p class="muted">Your games deserve a museum.</p>
        </div>
      </div>

      {% if error %}<div class="login-alert">{{ error }}</div>{% endif %}

      <form method="post" class="login-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>Username<input name="username" autocomplete="username" value="{{ auth_settings.username or 'admin' }}" autofocus></label>
        <label>Password<input type="password" name="password" autocomplete="current-password"></label>
        <button type="submit">Enter the Vault</button>
      </form>
    </section>
  </main>
</body>
</html>
