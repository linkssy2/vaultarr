{% extends "base.html" %}

{% block content %}
<a class="back-link" href="/library">← Back to Library</a>

<div class="vault-page-shell">
  <div class="page-header">
    <div>
      <p class="eyebrow">Manual Entry</p>
      <h1>Add Game</h1>
      <p class="muted">Add a game even if the scanner did not find it. You can match metadata after saving.</p>
    </div>
  </div>

  <section class="panel manual-add-panel">
    <form class="clean-form" action="/games/add" method="post">
      <div class="form-grid">
        <div>
          <label>Title</label>
          <input name="title" placeholder="My Fan Game" required>
        </div>
        <div>
          <label>Source</label>
          <select name="source_type">
            <option>Manual</option>
            <option>Fan Project</option>
            <option>PC Port</option>
            <option>Homebrew</option>
            <option>Prototype</option>
            <option>Imported</option>
          </select>
        </div>
        <div>
          <label>Category</label>
          <select name="category">
            <option>Manual</option>
            <option>Fanmade</option>
            <option>PC Port</option>
            <option>Homebrew</option>
            <option>Prototype</option>
            <option>Abandonware</option>
            <option>Other</option>
            <option>Unsorted</option>
          </select>
        </div>
        <div>
          <label>Folder Path <span class="muted">optional</span></label>
          <input name="path" placeholder="E:\Games\My Fan Game">
        </div>
      </div>

      <label>Description</label>
      <textarea name="description" placeholder="What is this game? Why is it in the vault?"></textarea>

      <div class="form-grid">
        <div><label>Developer</label><input name="developer"></div>
        <div><label>Publisher</label><input name="publisher"></div>
        <div><label>Year</label><input name="release_year"></div>
        <div><label>Genre</label><input name="genre"></div>
        <div><label>Platform</label><input name="platform" placeholder="PC, DOS, Windows"></div>
        <div><label>Tags</label><input name="tags" placeholder="hidden gem, horror, fps"></div>
      </div>

      <label>Notes</label>
      <textarea name="notes" placeholder="Install notes, version details, source notes, fixes, patches, etc."></textarea>

      <label class="checkbox-row">
        <input type="checkbox" name="metadata_locked">
        <span>Lock manual metadata so future automated updates do not overwrite it.</span>
      </label>

      <button type="submit">Add Game</button>
    </form>
  </section>
</div>
{% endblock %}
